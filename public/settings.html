<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <style>
        :root { --bg-color: #ffffff; --text-color: #172b4d; --input-bg: #f4f5f7; --subtext: #5e6c84; --link-color: #0052cc; }
        body.trello-theme-dark { --bg-color: #1d2125; --text-color: #b6c2cf; --input-bg: #22272b; --subtext: #8c9bab; --link-color: #579dff; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 16px; overflow: hidden; font-family: sans-serif; }
        input { background-color: var(--input-bg); border: 1px solid #dfe1e6; color: inherit; }
        .info-box { background-color: rgba(87, 157, 255, 0.1); border: 1px solid rgba(87, 157, 255, 0.2); }
    </style>
</head>
<body id="settings-container">
    <div class="space-y-4">
        <div>
            <label class="block text-[10px] font-bold uppercase mb-2 opacity-70 tracking-wide">Gemini API Configuration</label>
            <input type="password" id="apiKey" 
                class="w-full rounded p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500" 
                placeholder="Enter your Gemini API Key">
            
            <div class="mt-3 p-3 info-box rounded">
                <p class="text-[11px] leading-relaxed" style="color: var(--subtext)">
                    Your key is stored securely in Trello. Gemini 1.5 Flash offers a generous free tier.
                    <br>
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" 
                       class="font-bold hover:underline" style="color: var(--link-color)">
                       Get your Free Gemini API Key here →
                    </a>
                </p>
            </div>
        </div>
        <button id="saveBtn" class="w-full bg-[#579dff] hover:bg-[#0052cc] hover:text-white text-[#1d2125] font-bold py-2 rounded text-sm transition-all">
            Save Changes
        </button>
    </div>

    <script>
        const t = window.TrelloPowerUp.iframe();
        const input = document.getElementById('apiKey');

        t.render(() => {
            const context = t.getContext();
            document.body.classList.toggle('trello-theme-dark', context.theme === 'dark');
            t.sizeTo('#settings-container').done();
        });

        t.get('member', 'private', 'apiKey').then(val => { if(val) input.value = val; });

        document.getElementById('saveBtn').onclick = () => {
            t.set('member', 'private', 'apiKey', input.value.trim())
            .then(() => t.closePopup());
        };
    </script>
</body>
</html>
